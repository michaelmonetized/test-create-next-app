name: Ship

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: Vercel environment to pull before building
        required: true
        default: production
        type: choice
        options:
          - production
      deploy_prod:
        description: Deploy with --prod
        required: true
        default: true
        type: boolean

concurrency:
  group: ship-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ship:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --production --frozen-lockfile

      - name: Pull Vercel production environment
        run: bunx --bun vercel pull --yes --environment="${{ github.event.inputs.environment || 'production' }}" --token="$VERCEL_TOKEN"

      - name: Deploy Convex functions and build Vercel output
        if: env.CONVEX_DEPLOYMENT != '' && env.CONVEX_DEPLOY_KEY != ''
        env:
          NEXT_SKIP_BUILD_TYPECHECK: "1"
        run: |
          export GZ_OPT="-9"
          bunx convex deploy --yes --cmd 'bunx --bun vercel build --prod --token="$VERCEL_TOKEN"'

      - name: Build Vercel output
        if: env.CONVEX_DEPLOYMENT == '' || env.CONVEX_DEPLOY_KEY == ''
        env:
          NEXT_SKIP_BUILD_TYPECHECK: "1"
        run: |
          export GZ_OPT="-9"
          bunx --bun vercel build --prod --token="$VERCEL_TOKEN"

      - name: Archive Vercel output
        run: |
          export GZ_OPT="-9"
          tar -czf vercel-output.tgz .vercel/output

      - name: Upload Vercel output artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-output-${{ github.sha }}
          path: vercel-output.tgz
          if-no-files-found: error
          retention-days: 7

      - name: Deploy prebuilt output
        timeout-minutes: 10
        run: |
          bunx vercel deploy --prebuilt --prod --archive=tgz --yes --token="$VERCEL_TOKEN" | tee deployment.log
          tail -n 1 deployment.log > deployment-url.txt
          {
            echo "### Deployment"
            echo ""
            echo "- URL: $(cat deployment-url.txt)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify Vercel deployment
        timeout-minutes: 5
        run: |
          deployment_url="$(cat deployment-url.txt)"
          bunx vercel inspect "$deployment_url" --wait --timeout 3m --token="$VERCEL_TOKEN" --format=json > deployment.json
          curl --fail --show-error --silent --location --max-time 20 "" > /dev/null
          if ! curl --show-error --silent --location --max-time 20 "/api/health" > health.json; then
            printf '{"ok":false,"env":{"missing":["health request failed"],"optionalMissing":[]}}' > health.json
          fi
          {
            echo "- Deployment status: $(node -e 'const fs=require("fs"); const d=JSON.parse(fs.readFileSync("deployment.json", "utf8")); console.log(d.readyState ?? d.state ?? "unknown")')"
            echo "- Deployment page: "
            echo "- Health payload: $(node -e 'const fs=require("fs"); const h=JSON.parse(fs.readFileSync("health.json", "utf8")); console.log(JSON.stringify({ ok: h.ok, missing: h.env?.missing ?? [], optionalMissing: h.env?.optionalMissing ?? [] }))')"
          } >> "$GITHUB_STEP_SUMMARY"
